<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DisasterNet — National Dispatch Console</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040810; --bg2: #070d16; --surface: #0a121e; --surface2: #0f1c2c;
  --border: #162438; --border2: #1e3550; --border3: #2a4a6e;
  --accent: #00d4ff; --accent3: #39ff14; --warn: #ffcc00;
  --red: #ff1744; --orange: #ff6b35; --purple: #8b5cf6;
  --text: #c8e0f0; --text2: #6a9ab8; --text3: #334f6a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 9999;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  border-bottom: 1px solid var(--border2);
  background: rgba(4,8,16,0.97);
}
.logo { font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; color: var(--text); }
.logo em { color: var(--accent); font-style: normal; }
.header-sub { font-size: 9px; color: var(--red); letter-spacing: 2px; animation: blink 0.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

.dispatch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 0;
  min-height: calc(100vh - 52px);
}

.col { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: visible; }
.col:last-child { border-right: 0; }

@media (max-width: 700px) {
  .dispatch-grid { grid-template-columns: 1fr; }
  .col { border-right: 0; border-bottom: 1px solid var(--border); min-height: 60vh; }
  .col:last-child { border-bottom: 0; }
}

.col-head {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.col-title { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; color: var(--text3); text-transform: uppercase; }
.col-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.col-body::-webkit-scrollbar { width: 3px; }
.col-body::-webkit-scrollbar-thumb { background: var(--border2); }

/* ZONE DISPATCH — 18 ACTIVE CARDS */
.dz-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px;
  animation: msg-in 0.2s ease-out;
}
@keyframes msg-in { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }

.dz-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dz-id { font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); }
.dz-sev { font-size: 8px; padding: 2px 5px; border-radius: 2px; font-weight: 700; letter-spacing: 1px; }
.sev-critical { background: rgba(255,23,68,0.18); color: var(--red); border: 1px solid rgba(255,23,68,0.4); }
.sev-high { background: rgba(255,107,53,0.18); color: var(--orange); border: 1px solid rgba(255,107,53,0.4); }
.sev-medium { background: rgba(255,204,0,0.15); color: var(--warn); border: 1px solid rgba(255,204,0,0.35); }
.sev-low { background: rgba(0,200,81,0.12); color: #00c851; border: 1px solid rgba(0,200,81,0.3); }

.dz-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.dz-detail { font-size: 10px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
.dz-stats { display: flex; gap: 12px; font-size: 9px; color: var(--text3); margin-bottom: 8px; }

.dz-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.act-btn {
  padding: 4px 10px; border-radius: 2px; font-size: 8px; cursor: pointer;
  border: 1px solid; font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s; letter-spacing: 0.5px;
}
.act-btn.primary { border-color: rgba(0,212,255,0.3); color: var(--accent); background: rgba(0,212,255,0.06); }
.act-btn.primary:hover { background: rgba(0,212,255,0.15); }
.act-btn.warn { border-color: rgba(255,204,0,0.3); color: var(--warn); background: rgba(255,204,0,0.05); }
.act-btn.warn:hover { background: rgba(255,204,0,0.12); }
.act-btn.danger { border-color: rgba(255,23,68,0.3); color: var(--red); background: rgba(255,23,68,0.06); }
.act-btn.danger:hover { background: rgba(255,23,68,0.15); }
.act-btn.success { border-color: rgba(57,255,20,0.3); color: var(--accent3); background: rgba(57,255,20,0.05); }
.act-btn.success:hover { background: rgba(57,255,20,0.12); }

/* RESOURCE ASSIGNMENT */
.res-assign-card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 2px solid var(--accent); border-radius: 4px; padding: 10px 12px;
}
.ra-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.ra-name { font-size: 12px; font-weight: 600; }
.ra-count { font-size: 11px; color: var(--text2); }
.ra-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
.ra-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
.ra-zones { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.ra-zone-tag {
  font-size: 8px; padding: 2px 6px; border-radius: 2px;
  border: 1px solid rgba(0,212,255,0.25); color: var(--accent);
  background: rgba(0,212,255,0.06); cursor: pointer;
  transition: all 0.15s;
}
.ra-zone-tag:hover { background: rgba(0,212,255,0.15); }
.ra-zone-tag.active { background: rgba(0,212,255,0.2); border-color: rgba(0,212,255,0.5); }
.ra-note { font-size: 9px; color: var(--text3); }

/* DECISION LOG */
.dec-item {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 2px solid; border-radius: 4px; padding: 10px 12px;
  animation: msg-in 0.2s ease-out;
}
.dec-item.alert { border-left-color: var(--red); background: rgba(255,23,68,0.03); }
.dec-item.decision { border-left-color: var(--accent3); background: rgba(57,255,20,0.02); }
.dec-item.info { border-left-color: var(--accent); }
.dec-item.system { border-left-color: var(--text3); }
.dec-label { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 4px; }
.dec-text { font-size: 11px; color: var(--text2); line-height: 1.6; }

/* COMMAND BAR */
.command-bar {
  padding: 10px 12px; border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; display: flex; gap: 6px;
}
.cmd-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 3px; padding: 7px 10px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  outline: none; transition: border-color 0.2s;
}
.cmd-input:focus { border-color: rgba(0,212,255,0.4); }
.cmd-input::placeholder { color: var(--text3); }
.cmd-btn {
  padding: 7px 14px; background: var(--accent); color: var(--bg);
  border: none; border-radius: 3px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  font-weight: 700; letter-spacing: 1px;
  transition: background 0.15s;
}
.cmd-btn:hover { background: #33ddff; }

/* BADGE */
.badge { font-size: 8px; padding: 2px 6px; border-radius: 2px; font-weight: 700; }
.badge-red { background: rgba(255,23,68,0.2); color: var(--red); border: 1px solid rgba(255,23,68,0.4); animation: blink 2s infinite; }
.badge-green { background: rgba(57,255,20,0.12); color: var(--accent3); border: 1px solid rgba(57,255,20,0.3); }

/* TOAST */
.toast {
  position: fixed; bottom: 16px; right: 16px;
  padding: 10px 14px; background: var(--surface2);
  border: 1px solid var(--border2); border-left: 2px solid var(--accent3);
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text); z-index: 999;
  transform: translateX(110%); transition: transform 0.3s ease; max-width: 280px;
}
.toast.show { transform: translateX(0); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Disaster<em>Net</em> · DISPATCH CONSOLE</div>
  </div>
  <div class="header-sub">🔴 LIVE — INDIA MULTI-STATE DISASTER OPS</div>
  <div style="font-size:9px;color:var(--text3)" id="dispatchTime"></div>
</div>

<div class="dispatch-grid">

  <!-- COL 1: ZONE STATUS -->
  <div class="col">
    <div class="col-head">
      <div class="col-title">ZONE DISPATCH — 18 ACTIVE</div>
      <span class="badge badge-red">4 CRITICAL</span>
    </div>
    <div class="col-body" id="zoneDispatchList"></div>
  </div>

  <!-- COL 2: RESOURCE ASSIGNMENT -->
  <div class="col">
    <div class="col-head">
      <div class="col-title">RESOURCE ROUTING</div>
      <span class="badge badge-green">1,112 DEPLOYED</span>
    </div>
    <div class="col-body" id="resourceList"></div>
  </div>

  <!-- COL 3: DECISION LOG -->
  <div class="col">
    <div class="col-head">
      <div class="col-title">⚡ IMPULSE AI — DECISIONS</div>
    </div>
    <div class="col-body" id="decisionLog"></div>
    <div class="command-bar">
      <input class="cmd-input" id="cmdInput" placeholder="Issue command: 'Redirect NDRF Team 4 to Zone OD1 URGENT'" />
      <button class="cmd-btn" onclick="issueCommand()">SEND</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const ZONES = [
  { id:'MH1', name:'Mumbai — Dharavi',      sev:'critical', victims:1840, resources:18, detail:'Coastal flooding — 1,840 displaced — Dharavi inundated — NDRF boats deployed' },
  { id:'OD1', name:'Puri — Coastal Belt',    sev:'critical', victims:2300, resources:9,  detail:'Cyclone landfall 180km/h — 2,300 evacuated — power grid down — ODRAF active' },
  { id:'UK1', name:'Chamoli — Uttarakhand',  sev:'critical', victims:320,  resources:5,  detail:'Glacial outburst + landslide — NH58 blocked — 320 cut off — helicopter only' },
  { id:'AP1', name:'Vijayawada — Krishna',   sev:'critical', victims:5400, resources:22, detail:'Krishna river breach — 5,400 affected — 6 mandals inundated — SDRF boats active' },
  { id:'AS1', name:'Silchar — Barak Valley', sev:'high',     victims:1200, resources:28, detail:'Barak flood — NH6 submerged — 1,200 displaced — supply convoy pre-deployed' },
  { id:'BH1', name:'Darbhanga — Bihar',      sev:'high',     victims:3100, resources:31, detail:'Bagmati overflow — 3,100 in camps — NH57 reroute — medical convoy active' },
  { id:'GJ1', name:'Surat — Tapi River',     sev:'medium',   victims:440,  resources:35, detail:'Tapi overflowing — Ukai dam gates opened — low-lying areas under watch' },
  { id:'KL1', name:'Wayanad — Kerala',       sev:'high',     victims:640,  resources:17, detail:'Landslide — 640 displaced — tea estate workers evacuated — IMD red alert' },
  { id:'MP1', name:'Jabalpur — M.P.',        sev:'low',      victims:95,   resources:32, detail:'Narmada tributary minor flooding — 95 families at higher ground — stable' },
];

const RESOURCES = [
  { name:'NDRF Teams',         total:52,   deployed:44,  color:'#ff1744', zones:['OD1','AP1','MH1'] },
  { name:'SDRF Teams',         total:128,  deployed:98,  color:'#ff6b35', zones:['BH1','AS1','WB1'] },
  { name:'Medical Teams',      total:86,   deployed:71,  color:'#00d4ff', zones:['OD1','MH1','AP1'] },
  { name:'Rescue Boats',       total:340,  deployed:274, color:'#39ff14', zones:['MH1','AP1','BH1'] },
  { name:'Helicopters',        total:28,   deployed:23,  color:'#ffcc00', zones:['UK1','OD1','HP1'] },
  { name:'Supply Convoys',     total:94,   deployed:78,  color:'#8b5cf6', zones:['AS1','RJ1','GJ1'] },
  { name:'Army Columns',       total:18,   deployed:12,  color:'#ff1744', zones:['UK1','MN1','HP1'] },
  { name:'Coast Guard Vessels',total:14,   deployed:9,   color:'#00d4ff', zones:['OD1','MH1','TN1'] },
];

const DECISIONS = [
  { type:'system',   text:'Dispatch console connected to DisasterNet mesh. All zones loaded. Impulse AI monitoring active.' },
  { type:'decision', text:'⚡ DECISION: Cyclone landfall Zone OD1 — NDRF Team 7 deployed from Bhubaneswar. Helicopter 3 redirected from Zone KA1. 4 medics reassigned from Zone GJ1.' },
  { type:'alert',    text:'⚠ FIELD ALERT: Zone AP1 Vijayawada — Krishna river rising 0.4m/hr. Nagarjunasagar discharge increased. Downstream embankment breach probability 72% in 2hr. Pre-emptive rerouting recommended.' },
  { type:'decision', text:'⚡ DECISION: Route obstruction confirmed Zone BH1. NDRF Convoy 4 diverted via NH57 bypass — ETA +42min. Zone WB1 rescue team redistributed northward. Starknet log updated.' },
];

function renderZones() {
  const el = document.getElementById('zoneDispatchList');
  el.innerHTML = ZONES.map(z => `
    <div class="dz-card">
      <div class="dz-top">
        <div class="dz-id">ZONE ${z.id}</div>
        <div class="dz-sev sev-${z.sev}">${z.sev.toUpperCase()}</div>
      </div>
      <div class="dz-name">${z.name}</div>
      <div class="dz-detail">${z.detail}</div>
      <div class="dz-stats">
        <span>👥 ${z.victims} affected</span>
        <span>🚑 ${z.resources} units</span>
      </div>
      <div class="dz-actions">
        <button class="act-btn primary" onclick="dispatchAction('${z.id}','convoy')">🚛 CONVOY</button>
        <button class="act-btn warn" onclick="dispatchAction('${z.id}','medic')">🏥 MEDICS</button>
        <button class="act-btn danger" onclick="dispatchAction('${z.id}','heli')">🚁 HELI</button>
        <button class="act-btn success" onclick="dispatchAction('${z.id}','drone')">🚁 DRONE</button>
      </div>
    </div>`).join('');
}

function renderResources() {
  const el = document.getElementById('resourceList');
  el.innerHTML = RESOURCES.map(r => {
    const pct = Math.round(r.deployed/r.total*100);
    return `<div class="res-assign-card">
      <div class="ra-top"><span class="ra-name">${r.name}</span><span class="ra-count">${r.deployed}/${r.total} deployed</span></div>
      <div class="ra-bar"><div class="ra-fill" style="width:${pct}%;background:${r.color}"></div></div>
      <div style="font-size:9px;color:var(--text3);margin-bottom:6px">${pct}% utilization · ${r.total-r.deployed} in reserve</div>
      <div class="ra-zones">
        ${ZONES.map(z => `<div class="ra-zone-tag ${r.zones.includes(z.id)?'active':''}" onclick="assignResource('${r.name}','${z.id}',this)">Zone ${z.id}</div>`).join('')}
      </div>
      <div class="ra-note">Click zone to assign/withdraw unit</div>
    </div>`;
  }).join('');
}

function renderDecisions() {
  const el = document.getElementById('decisionLog');
  el.innerHTML = DECISIONS.map(d => `
    <div class="dec-item ${d.type}">
      <div class="dec-label">${{system:'SYSTEM',alert:'FIELD ALERT',decision:'AI DECISION',info:'ASSESSMENT'}[d.type]} · ${new Date().toLocaleTimeString()}</div>
      <div class="dec-text">${d.text}</div>
    </div>`).join('');
}

function addDecision(type, text) {
  DECISIONS.unshift({ type, text });
  renderDecisions();
}

function dispatchAction(zone, type) {
  const labels = { convoy:'Supply Convoy', medic:'Medical Team', heli:'Helicopter', drone:'Drone' };
  addDecision('decision', `⚡ DISPATCH: ${labels[type]} dispatched to Zone ${zone}. ETA calculated. Mesh broadcast sent to all nodes.`);
  showToast(`🚀 ${labels[type]} → Zone ${zone}`);
}

function assignResource(resource, zone, el) {
  el.classList.toggle('active');
  const assigned = el.classList.contains('active');
  addDecision('info', `📋 ${resource}: ${assigned?'assigned to':'withdrawn from'} Zone ${zone} in dispatch roster.`);
  showToast(`${assigned?'✓':'−'} ${resource} → Zone ${zone}`);
}

let isProcessing = false;

function issueCommand() {
  const cmd = document.getElementById('cmdInput').value.trim();
  if (!cmd || isProcessing) return;
  isProcessing = true;
  
  const btn = document.querySelector('.cmd-btn');
  btn.textContent = '...';
  btn.disabled = true;
  
  addDecision('alert', `📍 COMMAND ISSUED: ${cmd}`);
  
  // Broadcast to main window mesh
  channel.postMessage({ type: 'dispatch_command', command: cmd, ts: Date.now() });
  
  // Parse command for smart responses
  const cmdLower = cmd.toLowerCase();
  setTimeout(() => {
    let response = '';
    if (cmdLower.includes('convoy') || cmdLower.includes('redirect') || cmdLower.includes('divert')) {
      const zoneMatch = cmd.match(/zone\s+([A-Z][0-9])/i);
      const zone = zoneMatch ? zoneMatch[1].toUpperCase() : 'target zone';
      response = `⚡ DECISION: Convoy redirection confirmed. Supply convoy en route to Zone ${zone}. ETA calculated via NH48 — road status verified. Mesh broadcast sent to all field nodes. IPFS log updated.`;
    } else if (cmdLower.includes('medic') || cmdLower.includes('medical') || cmdLower.includes('doctor')) {
      response = `⚡ DECISION: Medical team dispatch authorized. 2 field medics reassigned from reserve pool. Nearest facility alerted. Patient load at destination assessed — triage protocol activated.`;
    } else if (cmdLower.includes('helicopter') || cmdLower.includes('heli') || cmdLower.includes('chopper')) {
      const zoneMatch = cmd.match(/zone\s+([A-Z][0-9])/i);
      const zone = zoneMatch ? zoneMatch[1].toUpperCase() : 'specified zone';
      response = `⚡ DECISION: Helicopter dispatch to Zone ${zone} authorized. Aerial assessment + supply drop scheduled. Pilot briefed. Ground team coordinating LZ. ETA 12-18 min depending on weather.`;
    } else if (cmdLower.includes('evacuate') || cmdLower.includes('evacuation')) {
      response = `⚡ DECISION: Evacuation order processed. Ground teams alerted + buses confirmed at staging area. Vulnerable population flagged for priority evacuation. Local authorities notified via mesh. Tracking evacuation progress.`;
    } else if (cmdLower.includes('drone')) {
      response = `⚡ DECISION: Drone dispatch command processed. Available drones tasked. Live aerial feed will be available in 5-8 minutes. Surveillance data being streamed to all active nodes.`;
    } else if (cmdLower.includes('sos') || cmdLower.includes('rescue') || cmdLower.includes('trapped')) {
      response = `⚡ DECISION: SOS / rescue priority elevated. Nearest rescue team (3 workers) dispatched immediately. Drone D1 redirected for aerial confirmation. Zone severity upgraded. All mesh nodes notified.`;
    } else {
      response = `⚡ DECISION: Command acknowledged and queued — "${cmd.substring(0,70)}". Action broadcast to all 4 active mesh nodes. Field teams notified. Monitoring for execution confirmation.`;
    }
    
    addDecision('decision', response);
    channel.postMessage({ type: 'agent_msg', content: response });
    
    btn.textContent = 'SEND';
    btn.disabled = false;
    isProcessing = false;
  }, 900);
  
  document.getElementById('cmdInput').value = '';
  showToast('⚡ Command sent to mesh');
}

document.getElementById('cmdInput').addEventListener('keydown', e => { if (e.key === 'Enter') issueCommand(); });

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function updateTime() {
  document.getElementById('dispatchTime').textContent = new Date().toLocaleString('en-IN');
}

setInterval(updateTime, 1000);
updateTime();
renderZones();
renderResources();
renderDecisions();

// Mesh sync with main window
const channel = new BroadcastChannel('disasternet_mesh_v2');
channel.onmessage = (e) => {
  const msg = e.data;
  if (msg.type === 'field_report') addDecision('alert', `📍 Field report from ${msg.from}: "${msg.text}"`);
  if (msg.type === 'agent_msg') addDecision('decision', msg.content);
};
</script>
</body>
</html>
